name: Docs

# Builds the MkDocs site and deploys it to the `gh-pages` branch.
# Enable GitHub Pages (Settings -> Pages -> Branch: gh-pages) after the first run.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "polyweave/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gh-deploy needs history to update the gh-pages branch
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU torch so mkdocstrings can import polyweave without a CUDA-sized wheel.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e ".[docs]"
      - name: Build and deploy
        run: mkdocs gh-deploy --force --no-history
