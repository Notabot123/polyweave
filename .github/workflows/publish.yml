name: Publish

# Builds the sdist + wheel and publishes to PyPI via Trusted Publishing (OIDC) —
# no API tokens are stored in the repository.
#
#   * push a tag like `v0.1.0`           -> publishes to real PyPI
#   * run manually (workflow_dispatch)   -> choose TestPyPI (default) or PyPI
#
# ONE-TIME SETUP before the first tag (done by the maintainer, not in code):
#   1. PyPI   -> Account -> Publishing -> add a "pending" trusted publisher:
#        project: polyweave | owner: Notabot123 | repo: polyweave
#        workflow: publish.yml | environment: pypi
#   2. (optional) repeat on test.pypi.org with environment: testpypi
#   3. GitHub -> Settings -> Environments -> create `pypi` (and `testpypi`).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build and check distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
